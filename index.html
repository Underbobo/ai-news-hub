<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 喜讯汇 | Top 50</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050508;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f5;
            --text-secondary: rgba(240, 240, 245, 0.55);
            --text-tertiary: rgba(240, 240, 245, 0.3);
            --accent-purple: #a78bfa;
            --accent-blue: #60a5fa;
            --accent-cyan: #22d3ee;
            --accent-pink: #f472b6;
            --accent-orange: #fb923c;
            --rank-gold: linear-gradient(135deg, #fbbf24, #f59e0b);
            --rank-silver: linear-gradient(135deg, #e5e7eb, #9ca3af);
            --rank-bronze: linear-gradient(135deg, #fdba74, #d97706);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态背景 */
        .bg-ambient {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-ambient::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(ellipse 600px 600px at 20% 30%, rgba(167, 139, 250, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 500px 500px at 80% 70%, rgba(96, 165, 250, 0.06) 0%, transparent 70%),
                radial-gradient(ellipse 400px 400px at 50% 50%, rgba(34, 211, 238, 0.04) 0%, transparent 70%);
            animation: ambientDrift 20s ease-in-out infinite;
        }
        @keyframes ambientDrift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-20px, 15px) rotate(1deg); }
            66% { transform: translate(15px, -10px) rotate(-1deg); }
        }

        /* 顶部导航 */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            background: rgba(5, 5, 8, 0.7);
            border-bottom: 1px solid var(--border-subtle);
        }
        .navbar-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 20px rgba(167, 139, 250, 0.3);
        }
        .logo-sub {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .nav-stats {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .stat-item {
            text-align: right;
        }
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 10px;
            color: var(--text-tertiary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .refresh-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .refresh-btn:hover {
            background: var(--bg-card-hover);
            border-color: rgba(167, 139, 250, 0.3);
            color: var(--text-primary);
        }
        .refresh-btn.spinning svg {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 主内容区 */
        .main {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 24px 80px;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 48px 0 40px;
        }
        .hero h1 {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        .hero h1 .gradient-text {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-desc {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 560px;
            margin: 0 auto 32px;
            line-height: 1.6;
        }
        .last-update {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 100px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            font-size: 12px;
            color: var(--text-tertiary);
        }
        .last-update .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .filter-chip {
            padding: 7px 16px;
            border-radius: 100px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        .filter-chip:hover {
            border-color: rgba(167, 139, 250, 0.3);
            color: var(--text-primary);
        }
        .filter-chip.active {
            background: rgba(167, 139, 250, 0.12);
            border-color: rgba(167, 139, 250, 0.4);
            color: var(--accent-purple);
        }
        .search-box {
            margin-left: auto;
            position: relative;
        }
        .search-box input {
            width: 240px;
            padding: 8px 14px 8px 36px;
            border-radius: 100px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: rgba(167, 139, 250, 0.4);
            background: var(--bg-card-hover);
        }
        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
        }

        /* 排行榜列表 */
        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rank-item {
            display: flex;
            align-items: stretch;
            gap: 0;
            border-radius: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .rank-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.03), rgba(96, 165, 250, 0.03));
            opacity: 0;
            transition: opacity 0.35s;
        }
        .rank-item:hover {
            background: var(--bg-card-hover);
            border-color: rgba(167, 139, 250, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(167, 139, 250, 0.1);
        }
        .rank-item:hover::before {
            opacity: 1;
        }

        /* 排名徽章 */
        .rank-badge {
            width: 64px;
            min-width: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            position: relative;
            flex-shrink: 0;
        }
        .rank-badge.top3 {
            font-size: 24px;
        }
        .rank-badge.gold {
            background: rgba(251, 191, 36, 0.08);
            color: #fbbf24;
        }
        .rank-badge.silver {
            background: rgba(229, 231, 235, 0.06);
            color: #d1d5db;
        }
        .rank-badge.bronze {
            background: rgba(253, 186, 116, 0.08);
            color: #fdba74;
        }
        .rank-badge.normal {
            color: var(--text-tertiary);
            font-weight: 600;
        }

        /* 内容区 */
        .rank-content {
            flex: 1;
            padding: 16px 20px 16px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 1;
        }
        .rank-title {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .rank-summary {
            font-size: 13px;
            line-height: 1.55;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: 2px;
        }
        .rank-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .rank-source {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-tertiary);
        }
        .rank-source .favicon {
            width: 14px; height: 14px;
            border-radius: 3px;
            background: var(--bg-card-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
        }
        .rank-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .tag-model { background: rgba(167, 139, 250, 0.1); color: var(--accent-purple); }
        .tag-product { background: rgba(96, 165, 250, 0.1); color: var(--accent-blue); }
        .tag-research { background: rgba(34, 211, 238, 0.1); color: var(--accent-cyan); }
        .tag-invest { background: rgba(251, 146, 60, 0.1); color: var(--accent-orange); }
        .tag-policy { background: rgba(244, 114, 182, 0.1); color: var(--accent-pink); }

        .rank-metrics {
            display: flex;
            gap: 16px;
            margin-top: 2px;
        }
        .metric {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: var(--text-tertiary);
        }
        .metric svg {
            width: 14px; height: 14px;
            opacity: 0.6;
        }
        .metric.hot {
            color: #fb923c;
        }
        .metric.hot svg {
            opacity: 1;
            fill: #fb923c;
        }

        /* 右侧分数 */
        .rank-score {
            width: 80px;
            min-width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            border-left: 1px solid var(--border-subtle);
            position: relative;
            z-index: 1;
        }
        .score-value {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .score-label {
            font-size: 9px;
            color: var(--text-tertiary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .score-trend {
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .trend-up { color: #22c55e; }
        .trend-down { color: #ef4444; }

        /* 加载状态 */
        .loading-state {
            text-align: center;
            padding: 80px 0;
            color: var(--text-tertiary);
        }
        .loading-spinner {
            width: 40px; height: 40px;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-purple);
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 1s linear infinite;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 0;
            color: var(--text-tertiary);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 32px; }
            .navbar-inner { padding: 0 16px; }
            .main { padding: 20px 16px 60px; }
            .search-box { width: 100%; margin-left: 0; }
            .search-box input { width: 100%; }
            .filter-bar { gap: 8px; }
            .rank-badge { width: 48px; min-width: 48px; font-size: 14px; }
            .rank-badge.top3 { font-size: 18px; }
            .rank-score { width: 64px; min-width: 64px; }
            .score-value { font-size: 16px; }
            .nav-stats { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-ambient"></div>

    <nav class="navbar">
        <div class="navbar-inner">
            <div class="logo">
                <div class="logo-icon">AI</div>
                <div>

                    <div class="logo-sub">AI Intelligence Hub</div>
                </div>
            </div>
            <div class="nav-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">--</div>
                    <div class="stat-label">条资讯</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="sourceCount">--</div>
                    <div class="stat-label">个来源</div>
                </div>
            </div>
            <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/>

                刷新数据
            </button>
        </div>
    </nav>

    <main class="main">
        <section class="hero">
            <h1>全网 AI <span class="gradient-text">Top 50</span> 热讯</h1>
            <p class="hero-desc">实时聚合全球人工智能领域最新动态，从模型发布到产品更新，从研究突破到资本动向</p>
            <div class="last-update">
                <span class="dot"></span>
                <span id="updateTime">加载中...</span>
            </div>
        </section>

        <div class="filter-bar">
            <div class="filter-chip active" data-filter="all">全部</div>
            <div class="filter-chip" data-filter="model">模型</div>
            <div class="filter-chip" data-filter="product">产品</div>
            <div class="filter-chip" data-filter="research">研究</div>
            <div class="filter-chip" data-filter="invest">投资</div>
            <div class="filter-chip" data-filter="policy">政策</div>
            <div class="search-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索关键词..." oninput="filterData()">
            </div>
        </div>

        <div id="newsList">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <div>正在加载 AI 资讯...</div>
            </div>
        </div>
    </main>

    <script>
        let allData = [];
        let currentFilter = 'all';

        // 分类标签映射
        const tagMap = {
            model: { label: '模型', class: 'tag-model' },
            product: { label: '产品', class: 'tag-product' },
            research: { label: '研究', class: 'tag-research' },
            invest: { label: '投资', class: 'tag-invest' },
            policy: { label: '政策', class: 'tag-policy' },
        };

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('./data.json?t=' + Date.now());
                if (!response.ok) throw new Error('Network error');
                allData = await response.json();
                renderData();
                updateStats();
                updateTime();
            } catch (e) {
                // 使用演示数据
                allData = generateDemoData();
                renderData();
                updateStats();
                updateTime();

                'LangChain v0.3 正式发布，核心链路性能提升 3 倍，内存占用减半，新增可视化调试工具。',

                'Figure AI 人形机器人进厂打工，每小时处理 500 个包裹，24 小时不间断作业。',

                'OpenAI 与苹果达成深度集成协议，Siri 将全面升级，支持自然语言多轮对话。',
                '欧盟正式通过 AI 法案最终版本，这是全球首部综合性 AI 监管法规，违规最高罚款 3500 万欧元。',
                '美国对华 AI 芯片出口管制再加码，H200 也在限制名单，国产替代进程加速。',
                '英伟达市值突破 3.5 万亿美元，超越苹果和微软，成为全球市值最高公司。',
            ];

            return titles.map((title, i) => ({
                rank: i + 1,
                title: title,
                summary: summaries[i] || '',
                source: sources[i % sources.length],
                url: '#',
                category: ['model', 'product', 'research', 'invest', 'policy'][i % 5],
                score: Math.round((100 - i * 1.5 + Math.random() * 5) * 10) / 10,
                trend: Math.random() > 0.3 ? 'up' : 'down',
                hot: Math.round(Math.random() * 5000 + 500),
                comments: Math.round(Math.random() * 800 + 50),
                time: new Date(Date.now() - Math.random() * 86400000 * 3).toISOString(),
            }));
        }

        // 渲染数据
        function renderData() {
            const list = document.getElementById('newsList');
            let data = [...allData];

            // 筛选
            if (currentFilter !== 'all') {
                data = data.filter(item => item.category === currentFilter);
            }

            // 搜索（标题 + 摘要）
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            if (search) {
                data = data.filter(item => {
                    const inTitle = item.title.toLowerCase().includes(search);
                    const inSummary = (item.summary || '').toLowerCase().includes(search);
                    return inTitle || inSummary;
                });
            }

            // 限制 Top 50
            data = data.slice(0, 50);

            if (data.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无匹配资讯</div>';
                return;
            }

            list.innerHTML = data.map((item, idx) => {
                const rank = idx + 1;
                const badgeClass = rank === 1 ? 'gold top3' : rank === 2 ? 'silver top3' : rank === 3 ? 'bronze top3' : 'normal';
                const tag = tagMap[item.category] || tagMap.model;
                const timeStr = new Date(item.time).toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                const trendIcon = item.trend === 'up' ? '&#9650;' : '&#9660;';
                const trendClass = item.trend === 'up' ? 'trend-up' : 'trend-down';

                return `
                <div class="rank-item" onclick="window.open('${item.url}', '_blank')">
                    <div class="rank-badge ${badgeClass}">${rank}</div>
                    <div class="rank-content">
                        <div class="rank-title">${item.title}</div>
                        ${item.summary ? `<div class="rank-summary">${item.summary}</div>` : ''}
                        <div class="rank-meta">
                            <div class="rank-source">
                                <div class="favicon">${item.source.charAt(0)}</div>
                                ${item.source} · ${timeStr}
                            </div>
                            <span class="rank-tag ${tag.class}">${tag.label}</span>
                        </div>
                        <div class="rank-metrics">
                            <div class="metric ${item.hot > 3000 ? 'hot' : ''}">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c0 0-7 4-7 11v3h14v-3c0-7-7-11-7-11z"/><path d="M9 22h6"/></svg>
                                ${formatNumber(item.hot)}
                            </div>
                            <div class="metric">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                ${formatNumber(item.comments)}
                            </div>
                        </div>
                    </div>
                    <div class="rank-score">
                        <div class="score-value">${item.score}</div>
                        <div class="score-label">热度</div>
                        <div class="score-trend ${trendClass}">${trendIcon} ${Math.abs(item.score - 85).toFixed(1)}</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // 格式化数字
        function formatNumber(n) {
            if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
            return n.toString();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalCount').textContent = allData.length;
            const sources = new Set(allData.map(d => d.source)).size;
            document.getElementById('sourceCount').textContent = sources;
        }

        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('updateTime').textContent =
                '更新于 ' + now.toLocaleString('zh-CN');
        }

        // 筛选切换
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                currentFilter = chip.dataset.filter;
                renderData();
            });
        });

        // 搜索过滤
        function filterData() {
            renderData();
        }

        // 刷新数据
        function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            btn.disabled = true;
            loadData().then(() => {
                setTimeout(() => {
                    btn.classList.remove('spinning');
                    btn.disabled = false;
                }, 800);
            });
        }

        // 初始化
        loadData();
    </script>
</body>
</html>
